# Config for the Render-hosted Prometheus. Scrapes the deployed ARGO app and
# remote_writes to Grafana Cloud, so history survives the service spinning down.
# The token is written to /tmp/gc_token by the entrypoint from an env var.

global:
  scrape_interval: 15s
  scrape_timeout: 10s

remote_write:
  - url: https://prometheus-prod-43-prod-ap-south-1.grafana.net/api/prom/push
    basic_auth:
      username: "3390490"
      password_file: /tmp/gc_token

scrape_configs:
  # The deployed ARGO API (also on Render). Scraping it has a useful side
  # effect: it keeps the ARGO app awake too while this Prometheus is running.
  - job_name: "argo"
    scheme: https
    static_configs:
      - targets: ["argo-rn2r.onrender.com"]
