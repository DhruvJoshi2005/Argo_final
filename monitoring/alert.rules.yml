# Alerting rules. Visible under the Alerts tab in the Prometheus UI.

groups:
  - name: argo-alerts
    rules:
      # p95 normally sits at a few ms, so this only trips on sustained misses.
      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_highr_seconds_bucket{job="argo"}[1m])) by (le)) > 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "ARGO p95 latency is high"
          description: "95th-percentile request latency has been above 1s for over a minute (expected value with caching is a few ms)."

      # Fires if the ARGO app stops responding to Prometheus scrapes at all.
      - alert: ArgoDown
        expr: up{job="argo"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "ARGO API is down"
          description: "Prometheus cannot scrape the ARGO app (it may have crashed or been stopped)."
